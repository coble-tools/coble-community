name: GitHub/Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Name of folder/institution (e.g. utils, icr...)'
        required: true
        default: 'utils'
      cbl:
        description: 'Name of cbl to build (e.g. small)'
        required: true
        default: 'small'
      ubuntu:
        description: 'Name of ubuntu version (e.g. 20.04, 22.04)'
        required: true
        default: '22.04'
      arch:
        description: 'Architecture to build (amd64, arm64 or both)'
        required: true
        type: choice
        default: 'both'
        options:
          - amd64
          - arm64
          - both

permissions:
  contents: read
  packages: write

jobs:
  build_amd64:
    if: ${{ github.event.inputs.arch == 'amd64' || github.event.inputs.arch == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""

      - name: Install coble via conda
        shell: bash -el {0}
        run: conda install -y rachelsa::coble

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [ "${{ github.event.inputs.arch }}" == "both" ]; then
            echo "IMAGE_TAG=ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-amd64" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}" >> $GITHUB_ENV
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.cargo
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          docker system prune -af --volumes || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Build and push
        shell: bash -el {0}
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          coble build \
            --recipe ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/${{ github.event.inputs.cbl }}.cbl \
            --validate ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate/validate.sh \
            --val-folder ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate \
            --env ${{ github.event.inputs.cbl }} \
            --ubuntu ${{ github.event.inputs.ubuntu }} \
            --containers docker \
            --image ${{ env.IMAGE_TAG }}

      - name: Ensure image is pushed
        run: |
          docker push ${{ env.IMAGE_TAG }}

      - name: Check disk space after build
        if: always()
        run: |
          echo "Final disk space:"
          df -h /
          echo "Docker images:"
          docker images | head -20
          echo "Docker system info:"
          docker system df

      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker system prune -af --volumes || true
          rm -f cbl-*.tar || true

  build_arm64:
    if: ${{ github.event.inputs.arch == 'arm64' || github.event.inputs.arch == 'both' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""

      - name: Install coble via conda
        shell: bash -el {0}
        run: conda install -y rachelsa::coble

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set image tag
        run: |
          if [ "${{ github.event.inputs.arch }}" == "both" ]; then
            echo "IMAGE_TAG=ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-arm64" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}" >> $GITHUB_ENV
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.cargo
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          docker system prune -af --volumes || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Build and push
        shell: bash -el {0}
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          coble build \
            --recipe ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/${{ github.event.inputs.cbl }}.cbl \
            --validate ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate/validate.sh \
            --val-folder ${{ github.event.inputs.folder }}/${{ github.event.inputs.cbl }}/validate \
            --env ${{ github.event.inputs.cbl }} \
            --ubuntu ${{ github.event.inputs.ubuntu }} \
            --containers docker \
            --image ${{ env.IMAGE_TAG }}

      - name: Ensure image is pushed
        run: |
          docker push ${{ env.IMAGE_TAG }}

      - name: Check disk space after build
        if: always()
        run: |
          echo "Final disk space:"
          df -h /
          echo "Docker images:"
          docker images | head -20
          echo "Docker system info:"
          docker system df

      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker system prune -af --volumes || true
          rm -f cbl-*.tar || true

  manifest:
    needs: [build_amd64, build_arm64]
    if: |
      always() &&
      github.event.inputs.arch == 'both' &&
      (needs.build_amd64.result == 'success' || needs.build_arm64.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          TAG=ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}
          IMAGES=""
          if [ "${{ needs.build_amd64.result }}" == "success" ]; then
            IMAGES="$IMAGES ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-amd64"
          fi
          if [ "${{ needs.build_arm64.result }}" == "success" ]; then
            IMAGES="$IMAGES ghcr.io/${{ env.OWNER }}/coble:${{ github.event.inputs.folder }}-${{ github.event.inputs.cbl }}-arm64"
          fi
          echo "Creating manifest from:$IMAGES"
          docker buildx imagetools create -t $TAG $IMAGES


